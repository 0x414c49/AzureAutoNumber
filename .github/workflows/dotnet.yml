name: .NET

on:
  push:
    branches: [ main ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '.github/workflows/**.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '.github/workflows/**.yml'

permissions:
  contents: write

jobs:
  version-bump:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      new_tag: ${{ steps.version.outputs.new_tag }}
      changed: ${{ steps.version.outputs.new_tag != steps.current_tag.outputs.tag }}
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Get current tag from .csproj
      id: current_tag
      run: |
        VERSION=$(grep -oP '(?<=<Version>)[^<]+' AutoNumber/AutoNumber.csproj | head -1 || true)
        
        if [ -z "$VERSION" ] || [ "$VERSION" = "" ]; then
          echo "Version is empty in .csproj, falling back to git tag"
          GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION="${GIT_TAG#v}"
        fi
        
        echo "Current version: $VERSION"
        echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
    
    - name: Get latest tag from git
      id: git_tag
      run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.0')" >> $GITHUB_OUTPUT
    
    - name: Calculate next version
      id: version
      run: |
        CURRENT_VERSION="${{ steps.current_tag.outputs.tag }}"
        CURRENT_VERSION="${CURRENT_VERSION#v}"
        
        echo "Current version: $CURRENT_VERSION"
        
        # Parse version
        MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
        MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
        PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
        
        echo "Parsed: MAJOR=$MAJOR, MINOR=$MINOR, PATCH=$PATCH"
        
        # Get commits since last tag
        LAST_TAG="${{ steps.git_tag.outputs.tag }}"
        COMMITS=$(git log ${LAST_TAG}..HEAD --oneline 2>/dev/null || git log --oneline)
        
        echo "Commits since $LAST_TAG:"
        echo "$COMMITS"
        
        # Determine bump type based on conventional commits
        BUMP_TYPE="none"
        
        if echo "$COMMITS" | grep -qE "^[a-f0-9]+ .*(\!|BREAKING CHANGE)"; then
          BUMP_TYPE="major"
        elif echo "$COMMITS" | grep -qE "^[a-f0-9]+ feat"; then
          BUMP_TYPE="minor"
        elif echo "$COMMITS" | grep -qE "^[a-f0-9]+ fix"; then
          BUMP_TYPE="patch"
        fi
        
        echo "Bump type: $BUMP_TYPE"
        
        # Calculate new version
        if [ "$BUMP_TYPE" = "major" ]; then
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
        elif [ "$BUMP_TYPE" = "minor" ]; then
          MINOR=$((MINOR + 1))
          PATCH=0
        elif [ "$BUMP_TYPE" = "patch" ]; then
          PATCH=$((PATCH + 1))
        else
          echo "No version bump needed (no conventional commits found)"
          echo "new_version=" >> $GITHUB_OUTPUT
          echo "new_tag=" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        NEW_VERSION="$MAJOR.$MINOR.$PATCH"
        NEW_TAG="v$NEW_VERSION"
        
        echo "New version: $NEW_VERSION"
        echo "New tag: $NEW_TAG"
        
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
    
    - name: Update .csproj version
      if: steps.version.outputs.new_tag != '' && steps.version.outputs.new_tag != steps.current_tag.outputs.tag
      run: |
        VERSION="${{ steps.version.outputs.new_version }}"
        echo "Updating to version: $VERSION"
        
        if [ -z "$VERSION" ]; then
          echo "ERROR: Version is empty!"
          exit 1
        fi
        
        sed -i "s|<Version>[^<]*</Version>|<Version>$VERSION</Version>|g" AutoNumber/AutoNumber.csproj
        sed -i "s|<AssemblyVersion>[^<]*</AssemblyVersion>|<AssemblyVersion>${VERSION}.0</AssemblyVersion>|g" AutoNumber/AutoNumber.csproj
        sed -i "s|<FileVersion>[^<]*</FileVersion>|<FileVersion>${VERSION}.0</FileVersion>|g" AutoNumber/AutoNumber.csproj
        sed -i "s|<PackageVersion>[^<]*</PackageVersion>|<PackageVersion>$VERSION</PackageVersion>|g" AutoNumber/AutoNumber.csproj
        
        echo "Updated .csproj. Verification:"
        grep -E "<(Version|PackageVersion|AssemblyVersion|FileVersion)>" AutoNumber/AutoNumber.csproj
    
    - name: Commit and push version bump
      if: steps.version.outputs.new_tag != '' && steps.version.outputs.new_tag != steps.current_tag.outputs.tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add AutoNumber/AutoNumber.csproj
        
        if git diff --staged --quiet; then
          echo "No changes to commit - version already up to date"
          exit 0
        fi
        
        git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
        git push
        git tag ${{ steps.version.outputs.new_tag }}
        git push origin ${{ steps.version.outputs.new_tag }}
    
    - name: No version change
      if: steps.version.outputs.new_tag == '' || steps.version.outputs.new_tag == steps.current_tag.outputs.tag
      run: echo "No version bump needed"

  build:
    needs: version-bump
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    
    - name: Install dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Test
      run: dotnet test --no-restore --configuration Release
    
    - name: Create the package
      run: dotnet pack --configuration Release --no-restore
    
    - name: Publish the package to NUGET
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}       
      if: ${{ github.ref == 'refs/heads/main' }}    
      run: dotnet nuget push AutoNumber/bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json --api-key $NUGET_API_KEY --skip-duplicate

  release:
    needs: [version-bump, build]
    if: always() && needs.version-bump.outputs.changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.version-bump.outputs.new_tag }}
        name: Release ${{ needs.version-bump.outputs.new_tag }}
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
